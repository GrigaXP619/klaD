<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Старший курьер</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F5F5F7;--card:#FFFFFF;--accent:#007AFF;--accent2:#34C759;--warn:#FF9500;--danger:#FF3B30;--text:#1C1C1E;--text-sec:#8E8E93;--border:#E5E5EA;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
#content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.tab{display:none}.tab.active{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;color:var(--text-sec);font-size:10px;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:24px;height:24px}
.page-title{font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:12px;color:var(--text-sec);margin-top:2px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--accent2);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:none;border:1.5px solid var(--accent);color:var(--accent)}
.btn-sm{padding:8px 14px;font-size:14px;width:auto;border-radius:8px}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;min-height:72px}
.form-row{margin-bottom:10px}
.form-label{font-size:13px;color:var(--text-sec);margin-bottom:4px;display:block}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-fix{background:#FEE2E2;color:#991B1B}
.record-item{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.record-id{font-weight:600;font-size:15px}
.record-time{font-size:12px;color:var(--text-sec)}
.record-comment{font-size:13px;color:var(--text-sec);margin-top:4px}
.record-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.action-btn{padding:6px 12px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.action-edit{background:#EFF6FF;color:#1D4ED8}
.action-del{background:#FEF2F2;color:#DC2626}
.action-copy{background:#F0FDF4;color:#15803D}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-sec)}
.empty-icon{font-size:40px;margin-bottom:8px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.check-item.checked .check-box{background:var(--accent2);border-color:var(--accent2);color:#fff}
.check-item.checked .check-box::after{content:"\2713";font-size:14px;font-weight:700}
.check-text{font-size:15px}
.battery-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.battery-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.battery-num{font-weight:600;font-size:15px}
.status-pills{display:flex;gap:6px}
.pill{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;background:var(--bg);color:var(--text-sec);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.active-ok{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
.active-warn{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
.active-broken{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-box{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.modal-title{font-size:18px;font-weight:700;margin-bottom:12px}
.report-body{flex:1;overflow-y:auto;background:var(--bg);border-radius:10px;padding:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:monospace;margin-bottom:12px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;pointer-events:none;white-space:nowrap}
.divider{height:1px;background:var(--border);margin:12px 0}
.input-row{display:flex;gap:8px}
.input-row input{flex:1}
</style>
</head>
<body>
<div id="app">
<div id="content">
<div id="tab-home" class="tab active">
<div class="page-title">Старший курьер</div>
<div class="stat-grid">
<div class="stat-card"><div class="stat-val" id="stat-tech">0</div><div class="stat-lbl">Техника</div></div>
<div class="stat-card"><div class="stat-val" id="stat-bat">0/0</div><div class="stat-lbl">Батареи ✅/⚠️</div></div>
<div class="stat-card"><div class="stat-val" id="stat-viol">0</div><div class="stat-lbl">Нарушения</div></div>
<div class="stat-card"><div class="stat-val" id="stat-inst">0</div><div class="stat-lbl">Инструктажи</div></div>
</div>
<button class="btn btn-success" onclick="openReport()">📊 Сформировать отчёт</button>
</div>
<div id="tab-tech" class="tab">
<div class="page-title">Техника</div>
<div class="card">
<input type="hidden" id="tech-edit-id">
<div class="form-row"><label class="form-label">QR / Пломба</label><input id="tech-qr" type="text" placeholder="Сканируй или введи"></div>
<div class="form-row"><label class="form-label">Номер</label><input id="tech-num" type="text" placeholder="Бортовой номер"></div>
<div class="form-2col">
<div class="form-row"><label class="form-label">Тип</label><select id="tech-type"><option>Э-вел</option><option>Э-самокат</option><option>Велосипед</option><option>Другое</option></select></div>
<div class="form-row"><label class="form-label">Статус</label><select id="tech-status"><option value="ok">✅ Норма</option><option value="warn">⚠️ Замечание</option><option value="fix">🔧 В ремонт</option></select></div>
</div>
<div class="form-row"><label class="form-label">Комментарий</label><textarea id="tech-comment" placeholder="Описание проблемы или заметка"></textarea></div>
<div style="display:flex;gap:8px">
<button class="btn btn-primary" id="tech-save-btn" onclick="saveTech()">Сохранить</button>
<button class="btn btn-outline btn-sm" id="tech-cancel-btn" style="display:none" onclick="cancelTechEdit()">Отмена</button>
</div>
</div>
<div id="tech-list"></div>
</div>
<div id="tab-bat" class="tab">
<div class="page-title">Батареи</div>
<div class="card">
<div class="input-row">
<input id="bat-input" type="text" placeholder="Номер батареи">
<button class="btn btn-primary btn-sm" onclick="addBattery()">Добавить</button>
</div>
</div>
<div id="bat-list"></div>
</div>
<div id="tab-zone" class="tab">
<div class="page-title">Зона</div>
<div class="card">
<div class="card-title">Чек-лист</div>
<div id="zone-checklist">
<div class="check-item" data-idx="0" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">Мусор убран</div></div>
<div class="check-item" data-idx="1" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">Продукты промаркированы</div></div>
<div class="check-item" data-idx="2" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">Сумки не на улице</div></div>
<div class="check-item" data-idx="3" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">Раздевалка в порядке</div></div>
<div class="check-item" data-idx="4" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">Зона готова к работе</div></div>
</div>
</div>
<div class="card">
<div class="card-title">Сумки</div>
<div class="form-2col">
<div class="form-row"><label class="form-label">Всего</label><input id="bags-total" type="number" placeholder="0"></div>
<div class="form-row"><label class="form-label">Выдано</label><input id="bags-issued" type="number" placeholder="0"></div>
</div>
<div class="form-row"><label class="form-label">Повреждено</label><input id="bags-damaged" type="number" placeholder="0"></div>
<div class="form-row"><label class="form-label">Комментарий</label><textarea id="zone-comment" placeholder="Заметки по зоне"></textarea></div>
<button class="btn btn-primary" onclick="saveZone()">Сохранить</button>
</div>
</div>
<div id="tab-viol" class="tab">
<div class="page-title">Нарушения</div>
<div class="card">
<input type="hidden" id="viol-edit-id">
<div class="form-row"><label class="form-label">ID курьера</label><input id="viol-id" type="text" placeholder="Табельный номер или ID"></div>
<div class="form-row"><label class="form-label">Имя (необязательно)</label><input id="viol-name" type="text" placeholder="Имя курьера"></div>
<div class="form-row"><label class="form-label">Тип нарушения</label><select id="viol-type"><option>ПДД</option><option>Внешний вид</option><option>Опоздание</option><option>Поведение</option><option>Оборудование</option><option>Другое</option></select></div>
<div class="form-row"><label class="form-label">Описание</label><textarea id="viol-desc" placeholder="Подробности нарушения"></textarea></div>
<div style="display:flex;gap:8px">
<button class="btn btn-danger" id="viol-save-btn" onclick="saveViolation()">Сохранить</button>
<button class="btn btn-outline btn-sm" id="viol-cancel-btn" style="display:none" onclick="cancelViolEdit()">Отмена</button>
</div>
</div>
<div id="viol-list"></div>
</div>
<div id="tab-inst" class="tab">
<div class="page-title">Инструктаж</div>
<div class="card">
<input type="hidden" id="inst-edit-id">
<div class="form-row"><label class="form-label">ID / Имя курьера</label><input id="inst-name" type="text" placeholder="Кого инструктировали"></div>
<div class="card-title" style="margin-top:8px">Темы</div>
<div class="check-item" data-topic="ПДД" onclick="toggleTopic(this)"><div class="check-box"></div><div class="check-text">ПДД</div></div>
<div class="check-item" data-topic="Безопасность" onclick="toggleTopic(this)"><div class="check-box"></div><div class="check-text">Безопасность</div></div>
<div class="check-item" data-topic="Оборудование" onclick="toggleTopic(this)"><div class="check-box"></div><div class="check-text">Оборудование</div></div>
<div class="check-item" data-topic="Внешний вид" onclick="toggleTopic(this)"><div class="check-box"></div><div class="check-text">Внешний вид</div></div>
<div class="check-item" data-topic="Регламент" onclick="toggleTopic(this)"><div class="check-box"></div><div class="check-text">Регламент</div></div>
<div class="divider"></div>
<div class="form-row"><label class="form-label">Заметка</label><textarea id="inst-note" placeholder="Дополнительно"></textarea></div>
<div style="display:flex;gap:8px">
<button class="btn btn-primary" id="inst-save-btn" onclick="saveInst()">Сохранить</button>
<button class="btn btn-outline btn-sm" id="inst-cancel-btn" style="display:none" onclick="cancelInstEdit()">Отмена</button>
</div>
</div>
<div id="inst-list"></div>
</div>
</div>
<nav class="nav">
<button class="nav-btn active" onclick="switchTab(0,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Главная</button>
<button class="nav-btn" onclick="switchTab(1,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Техника</button>
<button class="nav-btn" onclick="switchTab(2,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><line x1="10" y1="6" x2="14" y2="6"/></svg>Батареи</button>
<button class="nav-btn" onclick="switchTab(3,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Зона</button>
<button class="nav-btn" onclick="switchTab(4,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>Нарушения</button>
<button class="nav-btn" onclick="switchTab(5,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>Инструктаж</button>
</nav>
</div>
<div class="modal" id="modal-report">
<div class="modal-box">
<div class="modal-title">📊 Отчёт за смену</div>
<div class="report-body" id="report-text"></div>
<button class="btn btn-primary" style="margin-bottom:8px" onclick="copyReport()">📋 Скопировать</button>
<button class="btn btn-outline" style="margin-bottom:8px" onclick="clearShift()">🗑 Очистить смену</button>
<button class="btn btn-outline" onclick="closeModal('modal-report')">Закрыть</button>
</div>
</div>
<script>
try{if(window.Telegram&&window.Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();if(Telegram.WebApp.setHeaderColor)Telegram.WebApp.setHeaderColor('#F5F5F7')}}catch(e){}
function todayKey(){return'sc_data_'+new Date().toISOString().slice(0,10)}
function loadData(){try{return JSON.parse(localStorage.getItem(todayKey()))||defaultData()}catch(e){return defaultData()}}
function saveData(d){localStorage.setItem(todayKey(),JSON.stringify(d))}
function defaultData(){return{tech:[],batteries:[],zone:{checks:[false,false,false,false,false],bags:{total:'',issued:'',damaged:''},comment:''},violations:[],instructions:[]}}
function now(){return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
let data=loadData();
const tabs=['tab-home','tab-tech','tab-bat','tab-zone','tab-viol','tab-inst'];
function switchTab(i,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(tabs[i]).classList.add('active');btn.classList.add('active');document.getElementById('content').scrollTop=0;if(i===0)updateStats();if(i===1)renderTechList();if(i===2)renderBatteries();if(i===3)renderZone();if(i===4)renderViolations();if(i===5)renderInstructions()}
function updateStats(){document.getElementById('stat-tech').textContent=data.tech.length;document.getElementById('stat-bat').textContent=data.batteries.filter(b=>b.status==='ok').length+' / '+data.batteries.filter(b=>b.status==='weak').length;document.getElementById('stat-viol').textContent=data.violations.length;document.getElementById('stat-inst').textContent=data.instructions.length}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function copyText(text){try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text);else{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}}catch(e){}}
function saveTech(){const editId=document.getElementById('tech-edit-id').value;const qr=document.getElementById('tech-qr').value.trim();const num=document.getElementById('tech-num').value.trim();const type=document.getElementById('tech-type').value;const status=document.getElementById('tech-status').value;const comment=document.getElementById('tech-comment').value.trim();if(!qr&&!num){showToast('Введите QR/пломбу или номер');return}if(editId){const idx=data.tech.findIndex(t=>t.id==editId);if(idx!==-1)data.tech[idx]={...data.tech[idx],qr,num,type,status,comment};cancelTechEdit();showToast('✅ Запись обновлена')}else{data.tech.push({id:Date.now(),qr,num,type,status,comment,time:now()});showToast('✅ Техника сохранена')}saveData(data);document.getElementById('tech-qr').value='';document.getElementById('tech-num').value='';document.getElementById('tech-comment').value='';document.getElementById('tech-status').value='ok';document.getElementById('tech-type').value='Э-вел';renderTechList()}
function cancelTechEdit(){document.getElementById('tech-edit-id').value='';document.getElementById('tech-save-btn').textContent='Сохранить';document.getElementById('tech-cancel-btn').style.display='none';document.getElementById('tech-qr').value='';document.getElementById('tech-num').value='';document.getElementById('tech-comment').value='';document.getElementById('tech-status').value='ok';document.getElementById('tech-type').value='Э-вел'}
function editTech(id){const r=data.tech.find(t=>t.id==id);if(!r)return;document.getElementById('tech-edit-id').value=r.id;document.getElementById('tech-qr').value=r.qr||'';document.getElementById('tech-num').value=r.num||'';document.getElementById('tech-type').value=r.type||'Э-вел';document.getElementById('tech-status').value=r.status;document.getElementById('tech-comment').value=r.comment||'';document.getElementById('tech-save-btn').textContent='Обновить';document.getElementById('tech-cancel-btn').style.display='block';document.getElementById('content').scrollTop=0}
function deleteTech(id){if(!confirm('Удалить запись?'))return;data.tech=data.tech.filter(t=>t.id!=id);saveData(data);renderTechList();showToast('🗑 Удалено')}
function renderTechList(){const list=document.getElementById('tech-list');if(!data.tech.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">🚲</div>Записей пока нет</div>';return}const badges={ok:['badge-ok','✅ Норма'],warn:['badge-warn','⚠️ Замечание'],fix:['badge-fix','🔧 Ремонт']};list.innerHTML=[...data.tech].reverse().map(r=>{const[cls,lbl]=badges[r.status]||badges.ok;const title=[r.type,r.qr,r.num].filter(Boolean).join(' · ')||'—';return`<div class="record-item"><div class="record-header"><div class="record-id">${title}</div><div class="record-time">${r.time}</div></div><span class="status-badge ${cls}">${lbl}</span>${r.comment?`<div class="record-comment" style="margin-top:4px">${r.comment}</div>`:''}<div class="record-actions"><button class="action-btn action-edit" onclick="editTech(${r.id})">✏️ Изменить</button><button class="action-btn action-del" onclick="deleteTech(${r.id})">🗑 Удалить</button></div></div>`}).join('')}
function addBattery(){const num=document.getElementById('bat-input').value.trim();if(!num){showToast('Введите номер батареи');return}if(data.batteries.find(b=>b.num===num)){showToast('Уже добавлена');return}data.batteries.push({num,status:'ok'});saveData(data);document.getElementById('bat-input').value='';renderBatteries();showToast('🔋 Батарея добавлена')}
function setBatStatus(num,status){const bat=data.batteries.find(b=>b.num===num);if(bat){bat.status=status;saveData(data);renderBatteries()}}
function removeBattery(num){data.batteries=data.batteries.filter(b=>b.num!==num);saveData(data);renderBatteries()}
function renderBatteries(){const list=document.getElementById('bat-list');if(!data.batteries.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">🔋</div>Батарей пока нет</div>';return}list.innerHTML=data.batteries.map(b=>`<div class="battery-card"><div class="battery-top"><div class="battery-num">🔋 ${b.num}</div><button onclick="removeBattery('${b.num}')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-sec)">×</button></div><div class="status-pills"><div class="pill ${b.status==='ok'?'active-ok':''}" onclick="setBatStatus('${b.num}','ok')">✅ Норма</div><div class="pill ${b.status==='weak'?'active-warn':''}" onclick="setBatStatus('${b.num}','weak')">⚠️ Слабая</div><div class="pill ${b.status==='broken'?'active-broken':''}" onclick="setBatStatus('${b.num}','broken')">❌ Сломана</div></div></div>`).join('')}
function toggleCheck(el){const idx=parseInt(el.dataset.idx);data.zone.checks[idx]=!data.zone.checks[idx];el.classList.toggle('checked',data.zone.checks[idx]);saveData(data)}
function saveZone(){data.zone.bags.total=document.getElementById('bags-total').value;data.zone.bags.issued=document.getElementById('bags-issued').value;data.zone.bags.damaged=document.getElementById('bags-damaged').value;data.zone.comment=document.getElementById('zone-comment').value.trim();saveData(data);showToast('✅ Проверка зоны сохранена')}
function renderZone(){document.querySelectorAll('#zone-checklist .check-item').forEach((el,i)=>{el.classList.toggle('checked',!!data.zone.checks[i])});document.getElementById('bags-total').value=data.zone.bags.total||'';document.getElementById('bags-issued').value=data.zone.bags.issued||'';document.getElementById('bags-damaged').value=data.zone.bags.damaged||'';document.getElementById('zone-comment').value=data.zone.comment||''}
function saveViolation(){const editId=document.getElementById('viol-edit-id').value;const courierId=document.getElementById('viol-id').value.trim();if(!courierId){showToast('Введите ID курьера');return}const name=document.getElementById('viol-name').value.trim();const type=document.getElementById('viol-type').value;const desc=document.getElementById('viol-desc').value.trim();if(editId){const idx=data.violations.findIndex(v=>v.id==editId);if(idx!==-1)data.violations[idx]={...data.violations[idx],courierId,name,type,desc};cancelViolEdit();showToast('✅ Нарушение обновлено')}else{data.violations.push({id:Date.now(),courierId,name,type,desc,time:now()});showToast('✅ Нарушение сохранено')}saveData(data);document.getElementById('viol-id').value='';document.getElementById('viol-name').value='';document.getElementById('viol-desc').value='';document.getElementById('viol-type').value='ПДД';renderViolations()}
function cancelViolEdit(){document.getElementById('viol-edit-id').value='';document.getElementById('viol-save-btn').textContent='Сохранить';document.getElementById('viol-cancel-btn').style.display='none';document.getElementById('viol-id').value='';document.getElementById('viol-name').value='';document.getElementById('viol-desc').value='';document.getElementById('viol-type').value='ПДД'}
function editViolation(id){const r=data.violations.find(v=>v.id==id);if(!r)return;document.getElementById('viol-edit-id').value=r.id;document.getElementById('viol-id').value=r.courierId;document.getElementById('viol-name').value=r.name||'';document.getElementById('viol-type').value=r.type;document.getElementById('viol-desc').value=r.desc||'';document.getElementById('viol-save-btn').textContent='Обновить';document.getElementById('viol-cancel-btn').style.display='block';document.getElementById('content').scrollTop=0}
function deleteViolation(id){if(!confirm('Удалить нарушение?'))return;data.violations=data.violations.filter(v=>v.id!=id);saveData(data);renderViolations();showToast('🗑 Удалено')}
function copyComplaint(id){const r=data.violations.find(v=>v.id==id);if(!r)return;const date=new Date().toLocaleDateString('ru-RU');const text=`Нарушение: ${r.type}\nКурьер: ${r.courierId}${r.name?' | '+r.name:''}\nВремя: ${r.time}\nДата: ${date}${r.desc?'\nОписание: '+r.desc:''}\n\nНарушение зафиксировано старшим курьером.\nПрошу принять меры согласно регламенту.`;copyText(text);showToast('📋 Жалоба скопирована')}
function renderViolations(){const list=document.getElementById('viol-list');if(!data.violations.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>Нарушений не зафиксировано</div>';return}list.innerHTML=[...data.violations].reverse().map(r=>{const title=r.courierId+(r.name?' · '+r.name:'');return`<div class="record-item"><div class="record-header"><div class="record-id">${title}</div><div class="record-time">${r.time}</div></div><span class="status-badge badge-fix">${r.type}</span>${r.desc?`<div class="record-comment" style="margin-top:4px">${r.desc}</div>`:''}<div class="record-actions"><button class="action-btn action-edit" onclick="editViolation(${r.id})">✏️ Изменить</button><button class="action-btn action-copy" onclick="copyComplaint(${r.id})">📋 Жалоба</button><button class="action-btn action-del" onclick="deleteViolation(${r.id})">🗑 Удалить</button></div></div>`}).join('')}
function toggleTopic(el){el.classList.toggle('checked')}
function saveInst(){const editId=document.getElementById('inst-edit-id').value;const name=document.getElementById('inst-name').value.trim();if(!name){showToast('Введите ID / имя');return}const topics=[];document.querySelectorAll('#tab-inst .check-item[data-topic]').forEach(el=>{if(el.classList.contains('checked'))topics.push(el.dataset.topic)});if(!topics.length){showToast('Выберите темы');return}const note=document.getElementById('inst-note').value.trim();if(editId){const idx=data.instructions.findIndex(i=>i.id==editId);if(idx!==-1)data.instructions[idx]={...data.instructions[idx],name,topics,note};cancelInstEdit();showToast('✅ Инструктаж обновлён')}else{data.instructions.push({id:Date.now(),name,topics,note,time:now()});showToast('🎓 Инструктаж сохранён')}saveData(data);document.getElementById('inst-name').value='';document.getElementById('inst-note').value='';document.querySelectorAll('#tab-inst .check-item[data-topic]').forEach(el=>el.classList.remove('checked'));renderInstructions()}
function cancelInstEdit(){document.getElementById('inst-edit-id').value='';document.getElementById('inst-save-btn').textContent='Сохранить';document.getElementById('inst-cancel-btn').style.display='none';document.getElementById('inst-name').value='';document.getElementById('inst-note').value='';document.querySelectorAll('#tab-inst .check-item[data-topic]').forEach(el=>el.classList.remove('checked'))}
function editInst(id){const r=data.instructions.find(i=>i.id==id);if(!r)return;document.getElementById('inst-edit-id').value=r.id;document.getElementById('inst-name').value=r.name||'';document.getElementById('inst-note').value=r.note||'';document.querySelectorAll('#tab-inst .check-item[data-topic]').forEach(el=>{el.classList.toggle('checked',r.topics.includes(el.dataset.topic))});document.getElementById('inst-save-btn').textContent='Обновить';document.getElementById('inst-cancel-btn').style.display='block';document.getElementById('content').scrollTop=0}
function deleteInst(id){if(!confirm('Удалить инструктаж?'))return;data.instructions=data.instructions.filter(i=>i.id!=id);saveData(data);renderInstructions();showToast('🗑 Удалено')}
function renderInstructions(){const list=document.getElementById('inst-list');if(!data.instructions.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">🎓</div>Инструктажей пока нет</div>';return}list.innerHTML=[...data.instructions].reverse().map(r=>`<div class="record-item"><div class="record-header"><div class="record-id">${r.name}</div><div class="record-time">${r.time}</div></div><div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">${r.topics.map(t=>`<span class="status-badge badge-ok">${t}</span>`).join('')}</div>${r.note?`<div class="record-comment" style="margin-top:4px">${r.note}</div>`:''}<div class="record-actions"><button class="action-btn action-edit" onclick="editInst(${r.id})">✏️ Изменить</button><button class="action-btn action-del" onclick="deleteInst(${r.id})">🗑 Удалить</button></div></div>`).join('')}
function buildReport(){const d=data;const date=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});const zoneLabels=['Мусор убран','Продукты промаркированы','Сумки не на улице','Раздевалка в порядке','Зона готова к работе'];let L=[];L.push(`📊 ОТЧЁТ СТАРШЕГО КУРЬЕРА | ${date}`);L.push('━━━━━━━━━━━━━━━━━━━━━━━━');L.push('');const techOk=d.tech.filter(t=>t.status==='ok').length;const techWarn=d.tech.filter(t=>t.status==='warn').length;const techFix=d.tech.filter(t=>t.status==='fix').length;L.push(`🚲 ТЕХНИКА: проверено ${d.tech.length} единиц`);L.push(`  ✅ В норме: ${techOk}`);if(techWarn>0){L.push(`  ⚠️ Замечания (${techWarn}):`);d.tech.filter(t=>t.status==='warn').forEach(t=>{const p=[t.type,t.qr,t.num].filter(Boolean).join(' ');L.push(`    - ${p}${t.comment?' — '+t.comment:''}`)})}if(techFix>0){L.push(`  🔧 В ремонт (${techFix}):`);d.tech.filter(t=>t.status==='fix').forEach(t=>{const p=[t.type,t.qr,t.num].filter(Boolean).join(' ');L.push(`    - ${p}${t.comment?' — '+t.comment:''}`)})}L.push('');const batOk=d.batteries.filter(b=>b.status==='ok').length;const batWeak=d.batteries.filter(b=>b.status==='weak').length;const batBroken=d.batteries.filter(b=>b.status==='broken').length;L.push(`🔋 БАТАРЕИ: всего ${d.batteries.length}`);L.push(`  ✅ Норма: ${batOk} | ⚠️ Слабые: ${batWeak} | ❌ Сломаны: ${batBroken}`);L.push('');const bags=d.zone.bags;L.push(`📦 СУМКИ: всего ${bags.total||0}, выдано ${bags.issued||0}, повреждено ${bags.damaged||0}`);if(d.zone.comment)L.push(`  Комментарий: ${d.zone.comment}`);L.push('');const zoneChecked=d.zone.checks.filter(Boolean).length;L.push(`🗂 ЗОНА: выполнено ${zoneChecked}/5 пунктов`);if(zoneChecked<5){const failed=[];d.zone.checks.forEach((c,i)=>{if(!c)failed.push(zoneLabels[i])});L.push(`  Не выполнено: ${failed.join(', ')}`)}L.push('');L.push(`⚠️ НАРУШЕНИЯ: зафиксировано ${d.violations.length}`);if(d.violations.length>0){d.violations.forEach((v,i)=>{const ns=v.name?' | '+v.name:'';L.push(`  ${i+1}. ID: ${v.courierId}${ns} | ${v.type} | ${v.time}`);if(v.desc)L.push(`     ${v.desc}`)})}L.push('');L.push(`🎓 ИНСТРУКТАЖИ: проведено ${d.instructions.length}`);if(d.instructions.length>0){d.instructions.forEach((ins,i)=>{L.push(`  ${i+1}. ${ins.name} — ${ins.topics.join(', ')} | ${ins.time}`);if(ins.note)L.push(`     ${ins.note}`)})}L.push('');L.push('━━━━━━━━━━━━━━━━━━━━━━━━');L.push('Сформировано автоматически');return L.join('\n')}
function openReport(){document.getElementById('report-text').textContent=buildReport();document.getElementById('modal-report').style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
function copyReport(){copyText(document.getElementById('report-text').textContent);showToast('📋 Скопировано')}
function clearShift(){if(!confirm('Очистить все данные за смену?'))return;data=defaultData();saveData(data);updateStats();renderTechList();renderBatteries();renderZone();renderViolations();renderInstructions();closeModal('modal-report');showToast('🗑 Данные очищены')}
updateStats();
</script>
</body>
</html>
